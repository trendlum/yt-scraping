name: YouTube Scraper

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional max videos per channel"
        required: false
        type: string
      monitor_days:
        description: "Days of recent videos to refresh in batch mode"
        required: false
        default: "30"
        type: string
      baseline_window_days:
        description: "Publication window used to build per-channel baselines"
        required: false
        default: "30"
        type: string
      feature_workers:
        description: "Worker threads used for thumbnail enrichment"
        required: false
        default: "2"
        type: string
      topic_cluster_workers:
        description: "Worker threads used for topic clustering"
        required: false
        default: "8"
        type: string

permissions:
  contents: read

concurrency:
  group: youtube-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      YT_API_KEY: ${{ secrets.YT_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPER_LIMIT: ${{ inputs.limit }}
      SCRAPER_MONITOR_DAYS: ${{ inputs.monitor_days }}
      SCRAPER_BASELINE_WINDOW_DAYS: ${{ inputs.baseline_window_days }}
      SCRAPER_FEATURE_WORKERS: ${{ inputs.feature_workers }}
      SCRAPER_TOPIC_CLUSTER_WORKERS: ${{ inputs.topic_cluster_workers }}
      DEFAULT_LIMIT: ${{ vars.SCRAPER_DEFAULT_LIMIT }}
      DEFAULT_MONITOR_DAYS: ${{ vars.SCRAPER_DEFAULT_MONITOR_DAYS }}
      DEFAULT_BASELINE_WINDOW_DAYS: ${{ vars.SCRAPER_DEFAULT_BASELINE_WINDOW_DAYS }}
      DEFAULT_FEATURE_WORKERS: "2"
      DEFAULT_TOPIC_CLUSTER_WORKERS: "8"
      SCRAPER_LOG_LEVEL: ${{ vars.SCRAPER_LOG_LEVEL }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Install test dependencies
        if: github.event_name == 'workflow_dispatch'
        run: python -m pip install pytest

      - name: Validate required secrets
        run: |
          test -n "$YT_API_KEY"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Run tests
        if: github.event_name == 'workflow_dispatch'
        run: pytest

      - name: Run scraper
        shell: bash
        run: |
          set -euo pipefail
          LIMIT="${SCRAPER_LIMIT:-${DEFAULT_LIMIT:-}}"
          MONITOR_DAYS="${SCRAPER_MONITOR_DAYS:-${DEFAULT_MONITOR_DAYS:-30}}"
          BASELINE_WINDOW_DAYS="${SCRAPER_BASELINE_WINDOW_DAYS:-${DEFAULT_BASELINE_WINDOW_DAYS:-30}}"
          FEATURE_WORKERS="${SCRAPER_FEATURE_WORKERS:-${DEFAULT_FEATURE_WORKERS:-2}}"
          TOPIC_CLUSTER_WORKERS="${SCRAPER_TOPIC_CLUSTER_WORKERS:-${DEFAULT_TOPIC_CLUSTER_WORKERS:-8}}"
          LOG_LEVEL="${SCRAPER_LOG_LEVEL:-INFO}"

          CMD=(python -m yt_insights --output latest_run.json --monitor-days "$MONITOR_DAYS" --baseline-window-days "$BASELINE_WINDOW_DAYS" --feature-workers "$FEATURE_WORKERS" --topic-cluster-workers "$TOPIC_CLUSTER_WORKERS" --log-level "$LOG_LEVEL")
          if [ -n "${LIMIT:-}" ]; then
            CMD+=(--limit "$LIMIT")
          fi
          "${CMD[@]}"

      - name: Refresh analytical tables
        shell: bash
        run: |
          set -euo pipefail

          refresh_rpc() {
            local fn="$1"
            local payload="${2:-{}}"
            echo "Refreshing ${fn} with payload ${payload}"
            curl --fail-with-body -sS -X POST \
              "${SUPABASE_URL}/rest/v1/rpc/${fn}" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "${payload}" >/dev/null
          }

          refresh_rpc refresh_yt_niche_growth_analysis '{"p_window_days":30}'
          refresh_rpc refresh_yt_channel_growth_analysis '{"p_window_days":30}'
          refresh_rpc refresh_all_yt_underpackaged_video_analysis
          refresh_rpc refresh_all_yt_overpackaged_video_analysis
          refresh_rpc refresh_yt_topic_performance_analysis '{"p_window_days":30}'

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            EXTRA_WINDOWS=(60 90)
          else
            CURRENT_HOUR="$(date -u +%H)"
            if [ "${CURRENT_HOUR}" = "00" ]; then
              EXTRA_WINDOWS=(60 90)
            else
              EXTRA_WINDOWS=()
            fi
          fi

          for WINDOW in "${EXTRA_WINDOWS[@]}"; do
            refresh_rpc refresh_yt_niche_growth_analysis "{\"p_window_days\":${WINDOW}}"
            refresh_rpc refresh_yt_channel_growth_analysis "{\"p_window_days\":${WINDOW}}"
            refresh_rpc refresh_yt_topic_performance_analysis "{\"p_window_days\":${WINDOW}}"
          done

      - name: Upload latest run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-run-json-${{ github.run_number }}
          path: latest_run.json
          if-no-files-found: ignore
          retention-days: 7
