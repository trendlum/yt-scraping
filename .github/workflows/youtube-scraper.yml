name: YouTube Scraper

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional max videos per channel"
        required: false
        type: string
      monitor_days:
        description: "Days of recent videos to refresh in batch mode"
        required: false
        default: "30"
        type: string
      baseline_window_days:
        description: "Publication window used to build per-channel baselines"
        required: false
        default: "30"
        type: string

permissions:
  contents: read

concurrency:
  group: youtube-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      YT_API_KEY: ${{ secrets.YT_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPER_LIMIT: ${{ inputs.limit }}
      SCRAPER_MONITOR_DAYS: ${{ inputs.monitor_days }}
      SCRAPER_BASELINE_WINDOW_DAYS: ${{ inputs.baseline_window_days }}
      DEFAULT_LIMIT: ${{ vars.SCRAPER_DEFAULT_LIMIT }}
      DEFAULT_MONITOR_DAYS: ${{ vars.SCRAPER_DEFAULT_MONITOR_DAYS }}
      DEFAULT_BASELINE_WINDOW_DAYS: ${{ vars.SCRAPER_DEFAULT_BASELINE_WINDOW_DAYS }}
      SCRAPER_LOG_LEVEL: ${{ vars.SCRAPER_LOG_LEVEL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Validate required secrets
        run: |
          test -n "$YT_API_KEY"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Run tests
        if: github.event_name == 'workflow_dispatch'
        run: pytest

      - name: Run scraper
        shell: bash
        run: |
          set -euo pipefail
          LIMIT="${SCRAPER_LIMIT:-${DEFAULT_LIMIT:-}}"
          MONITOR_DAYS="${SCRAPER_MONITOR_DAYS:-${DEFAULT_MONITOR_DAYS:-30}}"
          BASELINE_WINDOW_DAYS="${SCRAPER_BASELINE_WINDOW_DAYS:-${DEFAULT_BASELINE_WINDOW_DAYS:-30}}"
          LOG_LEVEL="${SCRAPER_LOG_LEVEL:-INFO}"

          CMD=(python -m yt_insights --output latest_run.json --monitor-days "$MONITOR_DAYS" --baseline-window-days "$BASELINE_WINDOW_DAYS" --log-level "$LOG_LEVEL")
          if [ -n "${LIMIT:-}" ]; then
            CMD+=(--limit "$LIMIT")
          fi
          "${CMD[@]}"

      - name: Upload latest run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-run-json-${{ github.run_number }}
          path: latest_run.json
          if-no-files-found: ignore
          retention-days: 7
